name: CMake Build

on: [push, pull_request]

jobs:
  build:
    name: Build on ${{ matrix.os }} (${{ matrix.compiler }} - ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
            arch: x64
          - os: macos-latest
            compiler: clang
            arch: x64
          - os: windows-latest
            compiler: msvc
            arch: x64
          - os: windows-latest
            compiler: msvc
            arch: x86
          - os: windows-latest
            compiler: msvc
            arch: arm64
          - os: windows-latest
            compiler: mingw
            arch: x64

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Ninja
      run: |
        if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
          sudo apt-get update && sudo apt-get install -y ninja-build
        elif [ "${{ matrix.os }}" = "macos-latest" ]; then
          brew install ninja
        elif [ "${{ matrix.os }}" = "windows-latest" ]; then
          choco install ninja
        fi
      shell: bash

    - name: Setup MSVC
      if: matrix.compiler == 'msvc'
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: ${{ matrix.arch }}

    - name: Configure CMake
      run: cmake -G Ninja -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=Release -DUSE_BUNDLED_ZSTD=ON
      shell: bash

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config Release
