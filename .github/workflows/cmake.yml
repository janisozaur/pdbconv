name: CMake Build

on: [push, pull_request]

jobs:
  build:
    name: Build on ${{ matrix.os }} (${{ matrix.compiler }} - ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
            arch: amd64 # not actually meaningful, just for naming. The image itself is amd64.
          - os: macos-latest
            compiler: clang
            arch: arm64 # not actually meaningful, just for naming. The image itself is arm64.
          - os: windows-latest
            compiler: msvc
            arch: x64
          - os: windows-latest
            compiler: msvc
            arch: x64_x86
          - os: windows-latest
            compiler: msvc
            arch: x64_arm64
          - os: windows-latest
            compiler: mingw
            arch: x64

    steps:
    - uses: actions/checkout@v6

    - name: Install Ninja (Linux)
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y ninja-build

    - name: Setup MSVC
      if: matrix.compiler == 'msvc'
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: ${{ matrix.arch }}

    - name: Configure CMake
      run: cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=Release -DUSE_BUNDLED_ZSTD=ON

    - name: Build
      run: cmake --build build --config Release

    - name: Upload Artifacts
      uses: actions/upload-artifact@v7
      with:
        name: pdbconv-${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.arch }}
        path: |
          build/pdbconv/pdbconv
          build/pdbconv/pdbconv.exe
        if-no-files-found: error

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v8
      with:
        path: download

    - name: Prepare release assets
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p release-assets

        # Rename binaries to include the originating artifact name so assets are unique.
        while IFS= read -r -d '' file; do
          rel="${file#download/}"
          artifact_name="${rel%%/*}"
          base="$(basename "$file")"

          if [[ "$base" == "pdbconv.exe" ]]; then
            cp "$file" "release-assets/${artifact_name}.exe"
          else
            cp "$file" "release-assets/${artifact_name}"
          fi
        done < <(find download -type f \( -name 'pdbconv' -o -name 'pdbconv.exe' \) -print0)

        ls -la release-assets

    - name: Create immutable release
      uses: ncipollo/release-action@v1
      with:
        artifacts: release-assets/*
        immutableCreate: true
        allowUpdates: false
